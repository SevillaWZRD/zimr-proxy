name: Fetch Congress Trades

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trades
        run: |
          mkdir -p data
          python3 - << 'PYEOF'
import urllib.request, json
from datetime import datetime

trades = []

try:
    req = urllib.request.Request(
        'https://housestockwatcher.com/api',
        headers={'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json'}
    )
    with urllib.request.urlopen(req, timeout=20) as r:
        data = json.loads(r.read())
    for t in data[:100]:
        trades.append({
            'name': t.get('representative', ''),
            'ticker': t.get('ticker', '--'),
            'asset_description': t.get('asset_description', ''),
            'type': t.get('type', ''),
            'amount': t.get('amount', ''),
            'date': t.get('disclosure_date', ''),
            'traded': t.get('transaction_date', ''),
            'party': t.get('party', ''),
            'state': t.get('state', ''),
            'chamber': 'House',
        })
    print(f"Got {len(trades)} trades")
except Exception as e:
    print(f"Error: {e}")
    exit(1)

trades.sort(key=lambda x: x.get('date',''), reverse=True)
result = {'trades': trades[:100], 'count': len(trades), 'updated': datetime.utcnow().isoformat() + 'Z'}

with open('data/trades.json', 'w') as f:
    json.dump(result, f, indent=2)
print("Saved!")
PYEOF

      - name: Commit
        run: |
          git config user.name "ZIMR Bot"
          git config user.email "bot@zimrcapital.com"
          git add data/trades.json
          git diff --staged --quiet || git commit -m "Update trades $(date -u +%Y-%m-%d)"
          git push
